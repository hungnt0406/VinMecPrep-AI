name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "backend/**"
      - "frontend/**"
      - "mobile/**"
      - "docker-compose.yml"
  push:
    paths:
      - ".github/workflows/**"
      - "backend/**"
      - "frontend/**"
      - "mobile/**"
      - "docker-compose.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.backend }}
      frontend: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.frontend }}
      mobile: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.mobile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force all apps on manual runs
        if: github.event_name == 'workflow_dispatch'
        run: echo "workflow_dispatch selected; all app jobs will run."

      - name: Filter paths
        if: github.event_name != 'workflow_dispatch'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - ".github/workflows/**"
              - "backend/**"
              - "docker-compose.yml"
            frontend:
              - ".github/workflows/**"
              - "frontend/**"
              - "docker-compose.yml"
            mobile:
              - ".github/workflows/**"
              - "mobile/**"

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        working-directory: backend
        run: |
          python -m compileall src
          python -m compileall scripts

      - name: Create placeholder env files
        run: |
          touch backend/.env
          touch frontend/.env.local

      - name: Validate root Docker Compose
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate backend Docker Compose
        working-directory: backend
        run: docker compose -f docker-compose.yml config --quiet

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: local/backend-ci:${{ github.sha }}
          cache-from: type=gha,scope=backend-ci
          cache-to: type=gha,mode=max,scope=backend-ci

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Build app
        working-directory: frontend
        run: npm run build

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: local/frontend-ci:${{ github.sha }}
          cache-from: type=gha,scope=frontend-ci
          cache-to: type=gha,mode=max,scope=frontend-ci

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.mobile == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Validate Expo config
        working-directory: mobile
        run: npx expo config --type public > /dev/null

      - name: Run Expo Doctor
        working-directory: mobile
        run: npx expo-doctor
