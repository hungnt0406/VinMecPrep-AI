events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    # Docker embedded DNS resolver for dynamic service-name resolution.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting zone (tầng nginx, ngoài Redis rate limit của API)
    limit_req_zone $binary_remote_addr zone=chat_zone:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=health_zone:1m rate=60r/m;

    server {
        listen 80;
        server_name _;

        client_max_body_size 1m;

        # ── Static frontend ─────────────────────────────────────────────────
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|svg|ico|woff2)$ {
                expires 1d;
                add_header Cache-Control "public";
            }
        }

        # ── API reverse proxy ────────────────────────────────────────────────
        location = /api/chat {
            limit_req zone=chat_zone burst=10 nodelay;

            rewrite ^ /chat break;
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;

            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
            proxy_hide_header  Server;
            proxy_hide_header  X-Powered-By;
        }

        location /api/ {
            limit_req zone=chat_zone burst=10 nodelay;

            proxy_pass         http://api:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;

            # FIX SECURITY: dùng $remote_addr (không thể spoof)
            # KHÔNG dùng $proxy_add_x_forwarded_for (client có thể inject giá trị giả)
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;

            proxy_read_timeout 120s;
            proxy_send_timeout 30s;

            # Ẩn server header
            proxy_hide_header  Server;
            proxy_hide_header  X-Powered-By;
        }

        # ── Health check (bypass rate limit) ────────────────────────────────
        location /health {
            limit_req zone=health_zone burst=5;
            proxy_pass http://api:8000/health;
            access_log off;
        }

        # ── Block các path nhạy cảm ─────────────────────────────────────────
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
